<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #ffcc99, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden; 
    position: relative; 
}

/* =========================================
   CSS CHO HÌNH ẢNH TRANG TRÍ (MƯỢT MÀ 60FPS)
========================================= */
.decor-item {
    position: absolute;
    z-index: 2; 
    pointer-events: none; 
}

.decor-item img {
    width: 100%;
    border-radius: 24px; 
    box-shadow: 0 20px 45px rgba(0,0,0,0.25); 
    object-fit: cover;
    
    /* CÁC THUỘC TÍNH ÉP TRÌNH DUYỆT DÙNG GPU ĐỂ RENDER MƯỢT MÀ */
    will-change: transform;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transform: translateZ(0); 
}

/* Các nhịp độ và thời gian bay lơ lửng khác nhau để tạo sự tự nhiên */
.float-1 { animation: floatSmooth 8s ease-in-out infinite alternate; animation-delay: 0.5s; }
.float-2 { animation: floatSmooth 9.5s ease-in-out infinite alternate; animation-delay: 1.8s; }
.float-3 { animation: floatSmooth 11s ease-in-out infinite alternate; animation-delay: 3.2s; }
.float-4 { animation: floatSmooth 7.5s ease-in-out infinite alternate; animation-delay: 1.1s; }
.float-5 { animation: floatSmooth 9s ease-in-out infinite alternate; animation-delay: 4.5s; }
.float-6 { animation: floatSmooth 8.5s ease-in-out infinite alternate; animation-delay: 2.5s; }

/* Dùng translate3d thay vì translateY để kích hoạt phần cứng */
@keyframes floatSmooth {
    0% { transform: translate3d(0, 0px, 0) rotate(0deg); }
    100% { transform: translate3d(0, -35px, 0) rotate(8deg); }
}

/* Hiệu ứng chiều sâu (blur) cho các vật thể ở xa */
.blur-sm img { 
    filter: blur(3px); 
    opacity: 0.8; 
}
.blur-md img { 
    filter: blur(6px); 
    opacity: 0.5; 
}
.blur-sm, .blur-md {
    z-index: 1; /* Nằm dưới lớp sản phẩm nét */
}
/* ========================================= */

.container {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    text-align: center;
    width: 420px;
    max-width: 90%;
    position: relative;
    z-index: 10; 
}

.logo {
    width: 200px;
    margin-bottom: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

.title {
    font-size: 26px;
    font-weight: bold;
    color: #ff9800;
}

.message {
    font-size: 18px;
    color: #444;
    margin-top: 10px;
    line-height: 1.6;
}

.progress {
    width: 100%;
    height: 12px;
    background: #eee;
    border-radius: 10px;
    margin-top: 25px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #ff9800;
    animation: load 10s linear forwards;
}

@keyframes load {
    from { width: 0%; }
    to { width: 100%; }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, runTransaction }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBpThQgsy6FoGMFALL1mMdCDrupeqwD_c8",
    authDomain: "hust-man.firebaseapp.com",
    databaseURL: "https://hust-man-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "hust-man",
    storageBucket: "hust-man.firebasestorage.app",
    messagingSenderId: "1097366065563",
    appId: "1:1097366065563:web:cd629b7a98138506ab113e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let source = new URLSearchParams(window.location.search).get("utm_source") || "direct";

async function getAccurateIP() {
    try {
        const res = await fetch("https://1.1.1.1/cdn-cgi/trace");
        const text = await res.text();
        const ipLine = text.split('\n').find(line => line.startsWith('ip='));
        if (ipLine) return ipLine.split('=')[1].trim();
    } catch (e) {
        console.warn("Cloudflare trace failed, trying fallback...");
    }

    try {
        const res = await fetch("https://api64.ipify.org?format=json");
        const data = await res.json();
        return data.ip;
    } catch (e) {
        console.error("All IP fetch methods failed");
        return "Unknown IP";
    }
}

getAccurateIP().then(async (ip) => {

    let locationData = {};

    try {
        const res = await fetch(`http://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,lat,lon`);
        const data = await res.json();

        if (data.status === "success") {
            locationData = {
                quốc_gia: data.country,
                khu_vực: data.regionName,
                thành_phố: data.city,
                nhà_mạng: data.isp,
                tọa_độ: data.lat + "," + data.lon
            };
        }
    } catch (e) {
        console.error("Không lấy được vị trí");
    }

    // 🔥 Lưu Firebase
    push(ref(db, "NGƯỜI TRUY CẬP"), {
        Thời_gian: new Date().toLocaleString(),
        IP: ip,
        ...locationData,
        Thiết_bị: navigator.userAgent,
        Nơi_quét: source,

    });

    //  Tăng số lượng
    runTransaction(ref(db, "Tổng người đã quét"), (value) => {
        return (value || 0) + 1;
    });

    //  Gửi về Google Sheet
    fetch("https://script.google.com/macros/s/AKfycbyoOJ_3R40UEWpRzWbRT4a7vgk7I0RRDjV4dQjg_txo4EMiU9mauapwxhq98aIvKrTdDA/exec?ip=" + ip +
        "&device=" + encodeURIComponent(navigator.userAgent) +
        "&source=" + encodeURIComponent(source) +
        "&country=" + encodeURIComponent(locationData.quốc_gia || "") +
        "&city=" + encodeURIComponent(locationData.thành_phố || ""));
});

let startTime = Date.now();

window.addEventListener("beforeunload", function () {
    let stayTime = Math.round((Date.now() - startTime)/1000);
    gtag('event','time_on_page',{
        event_category:'engagement',
        event_label:'stay_time',
        value: stayTime
    });
});
</script>

        event_label:'user_redirect'
    });
    window.location.href="https://vn.shp.ee/TuGyf3Ro";
