<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUST MEN</title>

<meta property="og:title" content="HUST MEN gửi món quà nho nhỏ tặng bạn đây">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tnct123.github.io/SHOPPE-HUST-MEN/">
<meta property="og:image" content="https://tnct123.github.io/SHOPPE-HUST-MEN/logo.png">

<link rel="icon" href="logo.png">

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #ffcc99, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    position: relative;
}

/* ===== BACKGROUND FLOAT ===== */
.decor-item {
    position: absolute;
    z-index: 2; 
    pointer-events: none; 
}

.decor-item img {
    width: 100%;
    border-radius: 24px; 
    box-shadow: 0 20px 45px rgba(0,0,0,0.25); 
    object-fit: cover;
    
    /* CÁC THUỘC TÍNH ÉP TRÌNH DUYỆT DÙNG GPU ĐỂ RENDER MƯỢT MÀ */
    will-change: transform;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transform: translateZ(0); 
}

/* Các nhịp độ và thời gian bay lơ lửng khác nhau để tạo sự tự nhiên */
.float-1 { animation: floatSmooth 8s ease-in-out infinite alternate; animation-delay: 0.5s; }
.float-2 { animation: floatSmooth 9.5s ease-in-out infinite alternate; animation-delay: 1.8s; }
.float-3 { animation: floatSmooth 11s ease-in-out infinite alternate; animation-delay: 3.2s; }
.float-4 { animation: floatSmooth 7.5s ease-in-out infinite alternate; animation-delay: 1.1s; }
.float-5 { animation: floatSmooth 9s ease-in-out infinite alternate; animation-delay: 4.5s; }
.float-6 { animation: floatSmooth 8.5s ease-in-out infinite alternate; animation-delay: 2.5s; }

/* Dùng translate3d thay vì translateY để kích hoạt phần cứng */
@keyframes floatSmooth {
    0% { transform: translate3d(0, 0px, 0) rotate(0deg); }
    100% { transform: translate3d(0, -35px, 0) rotate(8deg); }
}

/* Hiệu ứng chiều sâu (blur) cho các vật thể ở xa */
.blur-sm img { 
    filter: blur(3px); 
    opacity: 0.8; 
}
.blur-md img { 
    filter: blur(6px); 
    opacity: 0.5; 
}
.blur-sm, .blur-md {
    z-index: 1; /* Nằm dưới lớp sản phẩm nét */
}
/* ========================================= */

.container {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    text-align: center;
    width: 420px;
    max-width: 90%;
    z-index: 10;
}

.logo {
    width: 200px;
    margin-bottom: 20px;
}

.title {
    font-size: 26px;
    font-weight: bold;
    color: #ff9800;
}

input {
    width: 90%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    padding: 12px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #e68900;
}
</style>

</head>

<body>

<div class="decor-item" style="top: -5%; left: -5%; width: 280px; transform: rotate(-15deg);">
    <img src="3.jpg" alt="Sản phẩm 3" class="float-1">
</div>
<div class="decor-item" style="bottom: -8%; right: -5%; width: 300px; transform: rotate(20deg);">
    <img src="4.jpg" alt="Sản phẩm 4" class="float-3">
</div>
<div class="decor-item" style="bottom: 15%; left: -6%; width: 240px; transform: rotate(12deg);">
    <img src="5.jpg" alt="Sản phẩm 5" class="float-5">
</div>
<div class="decor-item" style="top: 10%; right: -6%; width: 250px; transform: rotate(-20deg);">
    <img src="6.jpg" alt="Sản phẩm 6" class="float-2">
</div>

<div class="decor-item blur-sm" style="top: 35%; left: 8%; width: 180px; transform: rotate(25deg);">
    <img src="7.jpg" alt="Dứa" class="float-4">
</div>
<div class="decor-item blur-md" style="top: 15%; left: 30%; width: 140px; transform: rotate(-30deg);">
    <img src="8.jpg" alt="Hoa hồng" class="float-6">
</div>
<div class="decor-item blur-sm" style="bottom: 25%; right: 12%; width: 160px; transform: rotate(-15deg);">
    <img src="9.jpg" alt="Hoa nhài" class="float-2">
</div>
<div class="decor-item blur-md" style="top: 45%; right: 6%; width: 190px; transform: rotate(35deg);">
    <img src="10.jpg" alt="Quế" class="float-5">
</div>
<div class="decor-item blur-md" style="bottom: 8%; left: 32%; width: 130px; transform: rotate(-25deg);">
    <img src="11.png" alt="Hạt cà phê" class="float-1">
</div>
<div class="decor-item blur-sm" style="top: -2%; right: 35%; width: 170px; transform: rotate(10deg);">
    <img src="12.jpg" alt="Cam" class="float-3">
</div>

<!-- FORM -->
<div class="container" id="mainBox">
    <img src="logo.png" class="logo">
    <div class="title">HUST MEN</div>

    <p>Xin hãy nhập thông tin của bạn</p>

    <form id="form">
        <input type="text" id="name" placeholder="Họ và tên" required>
        <input type="number" id="age" placeholder="Tuổi" required>
        <input type="text" id="phone" placeholder="SĐT" required>

        <button type="submit">Xác nhận</button>
    </form>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let phone = document.getElementById("phone").value;

    fetch("https://script.google.com/macros/s/AKfycbz13v70o9ZZvXG2C2JaTBNZY1y9ABXIU1sZ9RlMxhIsCbLoU6GRsAbaERIM7fO4RU0X/exec?name=" 
        + encodeURIComponent(name)
        + "&age=" + age
        + "&phone=" + encodeURIComponent(phone),
    {
        method: "GET",
        mode: "no-cors"
    });

    alert("Đã nhận thông tin!");

    setTimeout(()=>{
        // thử đóng tab
        window.close();

        // fallback nếu không đóng được
        document.body.innerHTML = `
            <div style="text-align:center;margin-top:100px;font-size:20px;">
                Đã nhận thông tin<br><br>
                Bạn có thể đóng trang này
            </div>
        `;
    },1000);
});
</script>

</body>
</html>
